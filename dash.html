<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/dash.js"></script>
</head>
<body class = "index">

    <header>

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvwSo_IDWBaLemSkxPL7o142JAUYhO0guthg&s" id= "logo" class = "card">
        <h1>Finance Tracker</h1>

        <nav>
            <button class = "button" onclick="window.location.href='dash.html'">Dashboard</button>
            <button class = "button" onclick="window.location.href='add.html'">Add</button>
            <button class = "button" onclick="window.location.href='transactions.html'">Transactions</button>
            <button class = "button" onclick="window.location.href='statistics.html'">Statistics</button>
        </nav>

        <button class="button" id = "newMonth">Start New Month</button>
        <button class = "button" id = "theme-toggle">☀ | 🌙</button>
        <button class = "button" id = "settings-toggle">⚙</button>
    </header>

    <div id="overview" class = "card">
        <div id = "balance"><p>Balance</p></div>
        <div id = "income"><p>Income</p></div>
        <div id = "expense"><p>Expense</p></div>
    </div>

    <div id="recenttransaction" class = "card">

    </div>

    <div id="quickactions" class = "card">
        <div id="action">
            <button class = "btn" id = "add-income" onclick="window.location.href='add.html'">+</button>
            <label for="add-income">Add Income</label>
        </div>
        <div id="action">
            <button class = "btn" id = "add-expense" onclick="window.location.href='add.html'">+</button>
            <label for="add-expense">Add Expense</label>
        
    </div>

    
</body>
</html>
